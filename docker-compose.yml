services:
  db:
    image: postgres:17.0
    container_name: airah-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=airnah
    volumes:
      - pgdata_fresh:/var/lib/postgresql/data   # Renamed volume

volumes:
  pgdata_fresh:                                 # Renamed volume